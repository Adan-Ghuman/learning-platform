services:
  - type: web
    name: learning-platform-backend
    env: docker
    plan: free
    branch: main
    # Set the repo subdirectory that contains your Rails app and Dockerfile.
    # When `rootDirectory` is set to `learning_platform_be`, make `dockerfilePath` relative
    # to that directory (just `Dockerfile`). If you prefer leaving rootDirectory empty,
    # use `learning_platform_be/Dockerfile` as the Dockerfile path in the Render UI.
    rootDirectory: learning_platform_be
    dockerfilePath: Dockerfile
    autodeploy: true

databases:
  - name: learning-platform-db
    plan: starter
    # region: choose your region

# Note: Set production environment variables in the Render dashboard or via the CLI.
# Recommended env vars to add for the backend Web Service (`learning-platform-backend`):
# - RAILS_ENV=production
# - SECRET_KEY_BASE=<generate with `rails secret` and paste here> (secure)
# - DATABASE_URL=<Render Postgres connection string or external DB> (secure)
# - RAILS_SERVE_STATIC_FILES=true
# - RAILS_LOG_TO_STDOUT=true
# - (optional) SMTP_URL / SMTP_USERNAME / SMTP_PASSWORD etc. depending on your mail setup

# After setting the env vars, run migrations from the Render Shell (Service → Shell):
#   bundle exec rails db:create db:migrate db:seed RAILS_ENV=production

